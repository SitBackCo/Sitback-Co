<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8E1530"/>
      <stop offset="0.55" stop-color="#B11C3A"/>
      <stop offset="1" stop-color="#C42547"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0C44C"/>
      <stop offset="1" stop-color="#B08D2E"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="40" y="40" width="432" height="432" rx="84" fill="none" stroke="url(#gold)" stroke-width="4" opacity="0.4"/>
  <!-- sofa glyph centered lower -->
  <g fill="url(#gold)">
    <rect x="146" y="300" width="220" height="74" rx="18"/>
    <rect x="130" y="270" width="52" height="80" rx="20"/>
    <rect x="330" y="270" width="52" height="80" rx="20"/>
    <rect x="166" y="278" width="180" height="40" rx="14" opacity="0.85"/>
    <rect x="160" y="370" width="20" height="34" rx="6"/>
    <rect x="332" y="370" width="20" height="34" rx="6"/>
  </g>
  <!-- monogram SB -->
  <text x="256" y="225" font-family="Georgia, 'Times New Roman', serif" font-size="150" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="-6">SB</text>
  <text x="256" y="262" font-family="Georgia, serif" font-size="34" font-style="italic" font-weight="600" fill="#F0C44C" text-anchor="middle">&amp; Co</text>
