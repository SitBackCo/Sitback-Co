<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#B11C3A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sit Back & Co">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Sit Back &amp; Co</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --burg:#9B1B3F;--burg-d:#7A1230;--burg-l:#BC2950;--burg-br:#C73058;
  --gold:#E0A82E;--gold-d:#C28D1A;--gold-l:#F0C44C;
  --ink:#2A1A20;--ink-2:#4A3640;--ink-3:#6B5560;
  --bg:#FAF8F6;--card:#FFFFFF;--line:#F0E9E6;--line-2:#E6DCD8;
  --muted:#A89BA0;--muted-2:#8A7A80;
  --green:#1F9D6B;--green-l:#27B97E;--red:#E2466B;--blue:#4A7DD4;
  /* pastels */
  --pink:#FBE9EC;--pink-d:#F5CDD5;
  --mint:#E6F5EE;--mint-d:#C3E8D6;
  --lilac:#EEEAF8;--lilac-d:#D8CFEF;
  --peach:#FDEEE3;--peach-d:#F8D5BC;
  --sky:#E7F0FB;--sky-d:#C6DCF5;
  --shadow:rgba(155,27,63,.16);--shadow-soft:rgba(155,27,63,.07);
}
html{scroll-behavior:smooth}html,body{width:100%}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;font-size:14px;color:var(--ink);background:var(--bg);min-height:100vh;width:100%;-webkit-font-smoothing:antialiased}
.app{max-width:1100px;width:100%;margin:0 auto;padding:0 0 90px;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
/* ===== Bold burgundy banner ===== */
.topbar{
  background:linear-gradient(135deg,#7A1230 0%,#9B1B3F 50%,#BC2950 100%);
  border-radius:0 0 28px 28px;
  padding:22px 26px 0;
  margin-bottom:22px;
  box-shadow:0 12px 32px rgba(155,27,63,.32),0 4px 10px rgba(155,27,63,.2);
  position:sticky;top:0;z-index:50;
}
.topbar-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.logo{font-size:27px;font-weight:800;letter-spacing:-.02em;color:#fff;line-height:1}
.logo span{color:var(--gold-l)}
.logo-sub{font-size:10px;color:rgba(255,255,255,.7);font-weight:700;margin-top:4px;text-transform:uppercase;letter-spacing:.18em;text-align:right}
/* ===== Pill-chip tabs ===== */
.nav{display:flex;gap:7px;overflow-x:auto;padding-bottom:16px;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{
  font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;
  padding:9px 17px;border:none;cursor:pointer;white-space:nowrap;
  background:rgba(255,255,255,.16);color:rgba(255,255,255,.92);
  border-radius:30px;transition:all .18s;
}
.nav-btn:hover{background:rgba(255,255,255,.26)}
.nav-btn.active{background:#fff;color:var(--burg);box-shadow:0 4px 12px rgba(0,0,0,.16);font-weight:700}
/* content */
#view-dashboard,#view-deals,#view-money,#view-insights,#view-tools,#view-scout,#view-tracker,#view-analyse,#view-archive{padding:0 22px 40px;max-width:1100px;margin:0 auto}
.view{display:none;animation:fade .32s cubic-bezier(.2,.8,.2,1)}.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
/* ===== Buttons ===== */
.btn{font-size:13px;padding:9px 17px;border-radius:12px;border:none;background:#fff;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);font-weight:600;box-shadow:0 2px 8px var(--shadow-soft);transition:all .15s}
.btn:hover{box-shadow:0 4px 14px var(--shadow-soft);transform:translateY(-1px)}
.btn:active{transform:scale(.96)}
.btn-primary{background:linear-gradient(135deg,#9B1B3F,#BC2950);color:#fff;box-shadow:0 4px 14px var(--shadow)}
.btn-primary:hover{box-shadow:0 6px 20px var(--shadow);filter:brightness(1.06)}
.btn-sm{font-size:12px;padding:7px 13px;border-radius:10px}
.btn-xs{font-size:11px;padding:5px 11px;border-radius:9px}
.btn-danger{color:var(--red);background:var(--pink)}
.btn-danger:hover{background:var(--pink-d)}
.btn-ghost{background:var(--bg)}
/* ===== Stat cards (pastel tints) ===== */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
@media(max-width:640px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--card);border-radius:18px;padding:16px 18px;box-shadow:0 4px 16px var(--shadow-soft);transition:transform .15s,box-shadow .15s}
.stat:hover{transform:translateY(-3px);box-shadow:0 8px 22px var(--shadow-soft)}
.stat:nth-child(4n+1){background:var(--pink)}
.stat:nth-child(4n+2){background:var(--mint)}
.stat:nth-child(4n+3){background:var(--lilac)}
.stat:nth-child(4n+4){background:var(--peach)}
.stat-label{font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;font-weight:700;opacity:.75}
.stat-val{font-size:25px;font-weight:800;letter-spacing:-.02em;line-height:1;color:var(--ink)}
.stat-val.green{color:var(--green)}.stat-val.red{color:var(--red)}.stat-val.amber{color:var(--gold-d)}.stat-val.blue{color:var(--blue)}
.stat-sub{font-size:11px;color:var(--ink-3);margin-top:4px;font-weight:500;opacity:.8}
/* ===== Sections & cards ===== */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}
.section-title{font-size:18px;font-weight:800;letter-spacing:-.02em;color:var(--ink)}
.card{background:var(--card);border-radius:18px;padding:20px;margin-bottom:16px;box-shadow:0 4px 16px var(--shadow-soft);transition:box-shadow .15s}
.card:hover{box-shadow:0 6px 20px var(--shadow-soft)}
.card-title{font-size:15px;font-weight:700;margin-bottom:5px;color:var(--ink)}
.card-desc{font-size:12.5px;color:var(--muted-2);margin-bottom:15px;line-height:1.55}
/* ===== Deal cards ===== */
.deal-card{background:var(--card);border-radius:18px;margin-bottom:11px;overflow:hidden;box-shadow:0 3px 14px var(--shadow-soft);transition:box-shadow .18s,transform .15s}
.deal-card:hover{box-shadow:0 6px 20px var(--shadow-soft);transform:translateY(-1px)}
.deal-card.overdue{box-shadow:0 0 0 2px var(--pink-d),0 4px 16px var(--shadow-soft)}
.deal-card.deadcap{box-shadow:0 0 0 2px var(--peach-d),0 4px 16px var(--shadow-soft)}
.deal-header{display:flex;align-items:center;gap:11px;padding:15px 18px;cursor:pointer;user-select:none;transition:background .15s}
.deal-header:hover{background:var(--bg)}
.deal-header.open{border-bottom:1px solid var(--line);background:var(--bg)}
.status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot-sourcing{background:var(--green-l)}.dot-listed{background:var(--gold)}.dot-negotiating{background:var(--blue)}.dot-sold{background:var(--green)}.dot-dead{background:var(--muted)}
.deal-name{font-size:14.5px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink)}
.deal-health{font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px;flex-shrink:0}
.hp-good{background:var(--mint);color:#127A52}.hp-mid{background:var(--peach);color:#B5781A}.hp-bad{background:var(--pink);color:#C5345A}
.deal-profit{font-size:15px;font-weight:800;flex-shrink:0}
.profit-pos{color:var(--green)}.profit-neg{color:var(--red)}.profit-pending{color:var(--muted)}
.chevron{font-size:10px;color:var(--muted);transition:transform .25s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}
.deal-body{display:none;padding:17px}
.deal-body.open{display:block}
.tag{font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;flex-shrink:0;text-transform:uppercase;letter-spacing:.03em}
.tag-sourcing{background:var(--mint);color:#127A52}.tag-listed{background:var(--peach);color:#B5781A}.tag-negotiating{background:var(--sky);color:#3568BD}.tag-sold{background:var(--mint);color:#127A52}.tag-dead{background:var(--bg);color:var(--muted-2)}
.time-pill{font-size:10.5px;color:var(--ink-3);background:var(--bg);border-radius:20px;padding:3px 10px;flex-shrink:0;font-weight:600}
.time-pill.warn{background:var(--pink);color:var(--red)}
.time-pill.amber{background:var(--peach);color:var(--gold-d)}
/* ===== Fields ===== */
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:14px}
@media(max-width:520px){.field-grid{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:5px}
.field-label{font-size:10px;font-weight:700;color:var(--muted-2);text-transform:uppercase;letter-spacing:.05em}
.field input,.field select,.field textarea{font-size:13px;padding:10px 12px;border:1.5px solid var(--line-2);border-radius:12px;background:var(--bg);color:var(--ink);font-family:'Plus Jakarta Sans',sans-serif;width:100%;transition:all .15s}
.field textarea{resize:vertical;min-height:60px}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--burg-l);background:#fff;box-shadow:0 0 0 3px rgba(155,27,63,.1)}
.sub-divider{font-size:10.5px;font-weight:800;color:var(--burg);text-transform:uppercase;letter-spacing:.07em;margin:19px 0 12px;padding-bottom:9px;border-bottom:2px solid var(--line);display:flex;align-items:center;gap:8px}
.sub-divider::before{content:'';width:14px;height:3px;background:var(--gold);border-radius:2px}
/* ===== Checklist ===== */
.cl-item{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--line);cursor:pointer}
.cl-item:last-child{border-bottom:none}
.cl-box{width:20px;height:20px;border-radius:7px;border:2px solid var(--line-2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;background:#fff;transition:all .15s}
.cl-box.on{background:linear-gradient(135deg,#9B1B3F,#E0A82E);border-color:var(--burg)}
.cl-text{font-size:13px;color:var(--ink-2);line-height:1.4}
.cl-text.done{text-decoration:line-through;color:var(--muted)}
.check-progress{height:8px;background:var(--line);border-radius:5px;margin:6px 0 14px;overflow:hidden}
.check-fill{height:100%;background:linear-gradient(90deg,#9B1B3F,#E0A82E);border-radius:5px;transition:width .35s cubic-bezier(.2,.8,.2,1)}
/* ===== Updates ===== */
.upd-list{margin:4px 0 12px}
.upd-row{display:flex;gap:11px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
.upd-row:last-child{border-bottom:none}
.upd-time{font-size:11px;color:var(--muted);min-width:98px;padding-top:1px;flex-shrink:0;font-weight:600}
.upd-text{color:var(--ink-2);line-height:1.4}
.quick-btns{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:11px}
.quick-btn{font-size:11.5px;padding:7px 13px;border-radius:20px;border:none;background:var(--lilac);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink-2);font-weight:600;transition:all .14s}
.quick-btn:hover{background:var(--lilac-d);transform:translateY(-1px)}
.quick-btn:active{transform:scale(.94)}
.add-upd{display:flex;gap:8px}
.add-upd input{flex:1;font-size:13px;padding:10px 12px;border:1.5px solid var(--line-2);border-radius:12px;background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif}
.add-upd input:focus{outline:none;border-color:var(--burg-l);background:#fff}
/* ===== Margin boxes ===== */
.margin-box{border-radius:14px;padding:13px 16px;margin:12px 0;display:flex;justify-content:space-between;align-items:center}
.margin-good{background:var(--mint)}
.margin-warn{background:var(--peach)}
.margin-bad{background:var(--pink)}
.margin-label{font-size:12px;color:var(--ink-2);font-weight:600}
.margin-val{font-size:18px;font-weight:800}
.mv-g{color:#127A52}.mv-w{color:#B5781A}.mv-b{color:#C5345A}
/* ===== Empty ===== */
.empty{text-align:center;padding:3.5rem 0;color:var(--muted)}
.empty-title{font-size:16px;font-weight:700;margin-bottom:6px;color:var(--muted-2)}
.empty-sub{font-size:13px;color:var(--muted)}
.deal-actions{display:flex;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line);flex-wrap:wrap}
/* ===== Daily tracker (bold burgundy) ===== */
.daily-card{
  background:linear-gradient(135deg,#7A1230 0%,#9B1B3F 55%,#BC2950 100%);
  border-radius:22px;padding:24px;margin-bottom:18px;position:relative;overflow:hidden;
  box-shadow:0 12px 30px rgba(155,27,63,.3);
}
.daily-card::before{content:'';position:absolute;top:-30px;right:-30px;width:150px;height:150px;background:radial-gradient(circle,rgba(240,196,76,.3),transparent 70%);pointer-events:none}
.daily-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;position:relative}
.daily-title{font-size:16px;font-weight:800;color:#fff}
.daily-date{font-size:11.5px;color:rgba(255,255,255,.6);font-weight:600}
.daily-count{display:flex;align-items:baseline;gap:10px;margin-bottom:13px;position:relative}
.daily-num{font-size:48px;font-weight:800;color:var(--gold-l);line-height:1;letter-spacing:-.03em}
.daily-goal{font-size:15px;color:rgba(255,255,255,.65);font-weight:600}
.daily-bar{height:10px;background:rgba(0,0,0,.22);border-radius:6px;overflow:hidden;margin-bottom:15px;position:relative}
.daily-fill{height:100%;background:linear-gradient(90deg,#E0A82E,#F0C44C);border-radius:6px;transition:width .4s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 14px rgba(240,196,76,.6)}
.daily-actions{display:flex;gap:9px;position:relative}
.big-btn{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;padding:13px 20px;border-radius:14px;border:none;background:linear-gradient(135deg,#E0A82E,#F0C44C);color:#7A1230;cursor:pointer;font-weight:800;flex:1;transition:all .14s;box-shadow:0 4px 14px rgba(0,0,0,.18)}
.big-btn:hover{filter:brightness(1.06);transform:translateY(-1px)}.big-btn:active{transform:scale(.97)}
.big-btn.minus{background:rgba(255,255,255,.16);color:#fff;flex:0 0 auto;padding:13px 19px;box-shadow:none}
.big-btn.minus:hover{background:rgba(255,255,255,.24)}
.daily-msg{font-size:12.5px;padding:11px 15px;border-radius:12px;margin-top:13px;text-align:center;font-weight:700;position:relative}
.daily-msg.go{background:rgba(240,196,76,.2);color:var(--gold-l)}.daily-msg.win{background:rgba(39,185,126,.25);color:#5EE0A8}
/* ===== Briefing card ===== */
.summary-card{background:var(--card);border-radius:22px;padding:22px;margin-bottom:18px;position:relative;overflow:hidden;box-shadow:0 6px 22px var(--shadow-soft)}
.summary-title{font-size:15px;font-weight:800;color:var(--burg);margin-bottom:15px;display:flex;align-items:center;gap:9px;padding-bottom:12px;border-bottom:2px solid var(--line)}
.summary-row{display:flex;align-items:flex-start;gap:13px;padding:11px 0;border-bottom:1px solid var(--line);font-size:13px}
.summary-row:last-child{border-bottom:none}
.summary-icon{width:28px;height:28px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;font-weight:800}
.si-chase{background:var(--peach);color:var(--gold-d)}.si-overdue{background:var(--pink);color:var(--red)}.si-list{background:var(--mint);color:var(--green)}.si-good{background:var(--mint);color:var(--green)}
.summary-text{color:var(--ink-2);line-height:1.5;padding-top:4px}
.summary-text b{color:var(--ink);font-weight:700}
/* ===== Pipeline ===== */
.pipeline{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
@media(max-width:640px){.pipeline{gap:7px}}
.pipe-stage{background:var(--card);border-radius:16px;padding:16px 8px;text-align:center;position:relative;box-shadow:0 3px 12px var(--shadow-soft);transition:transform .15s}
.pipe-stage:hover{transform:translateY(-3px)}
.pipe-stage:nth-child(1){background:var(--mint)}
.pipe-stage:nth-child(2){background:var(--peach)}
.pipe-stage:nth-child(3){background:var(--sky)}
.pipe-stage:nth-child(4){background:var(--mint)}
.pipe-stage:nth-child(5){background:var(--bg)}
.pipe-count{font-size:28px;font-weight:800;line-height:1;margin-bottom:5px;color:var(--ink)}
@media(max-width:640px){.pipe-count{font-size:21px}}
.pipe-label{font-size:9.5px;color:var(--ink-3);font-weight:700;text-transform:uppercase;letter-spacing:.03em;opacity:.8}
.pipe-stuck{position:absolute;top:8px;right:8px;width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 0 3px rgba(226,70,107,.2)}
/* ===== Tools ===== */
.tool-row{display:flex;gap:8px;flex-wrap:wrap}
.tool-row input{flex:1;min-width:180px;font-size:13px;padding:11px 13px;border:1.5px solid var(--line-2);border-radius:12px;background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif}
.tool-row input:focus{outline:none;border-color:var(--burg-l);background:#fff}
.info-line{font-size:11.5px;color:var(--muted);margin-top:10px;line-height:1.5}
.note{font-size:11.5px;background:var(--peach);color:#8A5A12;border-radius:12px;padding:12px 14px;margin-top:12px;line-height:1.5}
.overdue-banner{border-radius:14px;padding:13px 16px;margin-bottom:14px;font-size:12.5px;font-weight:700}
.ob-red{background:var(--pink);color:var(--red)}
.ob-amber{background:var(--peach);color:var(--gold-d)}
/* ===== Insights ===== */
.insight-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--line)}
.insight-row:last-child{border-bottom:none}
.insight-name{font-size:13.5px;font-weight:700;color:var(--ink)}
.insight-meta{font-size:11.5px;color:var(--muted);margin-top:2px}
.insight-val{font-size:17px;font-weight:800;text-align:right}
.iv-green{color:var(--green)}
.badge-best{font-size:9.5px;background:linear-gradient(135deg,#9B1B3F,#E0A82E);color:#fff;padding:2px 9px;border-radius:20px;font-weight:800;margin-left:8px;letter-spacing:.03em}
/* ===== Monthly ===== */
.month-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;margin-bottom:14px}
@media(max-width:520px){.month-grid{grid-template-columns:1fr}}
.month-stat{border-radius:16px;padding:17px;text-align:center}
.ms-in{background:var(--mint)}.ms-out{background:var(--pink)}.ms-net{background:linear-gradient(135deg,#7A1230,#9B1B3F)}
.month-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.ms-in .month-label{color:#127A52}.ms-out .month-label{color:var(--red)}.ms-net .month-label{color:var(--gold-l)}
.month-val{font-size:26px;font-weight:800}
.ms-in .month-val{color:#127A52}.ms-out .month-val{color:#C5345A}.ms-net .month-val{color:#fff}
.target-bar{height:10px;background:var(--line);border-radius:6px;overflow:hidden;margin:8px 0 6px}
.target-fill{height:100%;border-radius:6px;transition:width .4s cubic-bezier(.2,.8,.2,1)}
.tf-green{background:linear-gradient(90deg,#1F9D6B,#27B97E)}.tf-amber{background:linear-gradient(90deg,#9B1B3F,#E0A82E)}
.target-text{font-size:12px;color:var(--ink-2);font-weight:700;text-align:center}
/* ===== Cash flow ===== */
.cash-split{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
@media(max-width:520px){.cash-split{grid-template-columns:1fr}}
.cash-box{border-radius:18px;padding:19px;position:relative;overflow:hidden;box-shadow:0 4px 16px var(--shadow-soft)}
.cash-tied{background:var(--peach)}
.cash-pocket{background:var(--mint)}
.cash-label{font-size:11px;font-weight:700;margin-bottom:7px;text-transform:uppercase;letter-spacing:.05em}
.cash-tied .cash-label{color:#8A5A12}.cash-pocket .cash-label{color:#127A52}
.cash-val{font-size:30px;font-weight:800}
.cash-tied .cash-val{color:#B5781A}.cash-pocket .cash-val{color:#127A52}
.cash-sub{font-size:11.5px;margin-top:6px;font-weight:600}
.cash-tied .cash-sub{color:#A06A1A}.cash-pocket .cash-sub{color:#1F9D6B}
.price-suggest{background:var(--sky);border-radius:14px;padding:13px 16px;margin:12px 0;font-size:13px;color:#2C5AA8;line-height:1.5}
.price-suggest b{font-weight:800}
/* ===== Modal & toast ===== */
.warn-modal-bg{display:none;position:fixed;inset:0;background:rgba(42,26,32,.55);z-index:100;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.warn-modal-bg.show{display:flex}
.warn-modal{background:var(--card);border-radius:20px;padding:24px;max-width:380px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.3)}
.warn-modal-title{font-size:17px;font-weight:800;color:var(--red);margin-bottom:8px}
.warn-modal-text{font-size:13.5px;color:var(--ink-2);line-height:1.55;margin-bottom:18px}
.warn-modal-actions{display:flex;gap:8px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:linear-gradient(135deg,#7A1230,#9B1B3F);color:#fff;padding:13px 22px;border-radius:14px;font-size:13px;font-weight:700;opacity:0;transition:all .3s cubic-bezier(.2,.8,.2,1);z-index:200;pointer-events:none;box-shadow:0 10px 30px var(--shadow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:760px){.toast{bottom:90px}}

@keyframes confettiFall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulse-load,.analysing-pulse{animation:pulse 1.4s ease-in-out infinite;font-size:14px;color:var(--burg);font-weight:700;text-align:center;padding:22px 0}
.sort-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;padding:12px 14px;background:var(--card);border-radius:14px;box-shadow:0 3px 12px var(--shadow-soft)}
.sort-group{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.sort-label{font-size:10px;font-weight:700;color:var(--muted-2);text-transform:uppercase;letter-spacing:.05em;margin-right:2px}
.sort-btn{font-size:12px;padding:6px 12px;border-radius:20px;border:1.5px solid var(--line-2);background:var(--bg);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink-2);font-weight:600;transition:all .15s}
.sort-btn:hover{background:var(--pink)}
.sort-active{background:var(--burg)!important;color:#fff!important;border-color:var(--burg)!important;box-shadow:0 2px 8px var(--shadow)}
@media(max-width:480px){.pipe-label{font-size:7.5px;letter-spacing:0;word-break:break-word}}
@media(max-width:360px){.pipeline{gap:4px}.pipe-count{font-size:18px}.pipe-stage{padding:12px 4px}}
@media(prefers-color-scheme:dark){
  :root{--bg:#1A1214;--card:#251A1E;--line:#352228;--line-2:#432B32;--ink:#F2E8EB;--ink-2:#D4C5C9;--ink-3:#A89098;--muted:#6B5560;--muted-2:#8A7078;--pink:#3A1E24;--pink-d:#4A2530;--mint:#162820;--mint-d:#1E3828;--lilac:#1E1A2E;--peach:#2E1E14;--sky:#162030;}
  body{background:var(--bg)}
  .card,.deal-card,.stat{box-shadow:0 4px 16px rgba(0,0,0,.4)}
}

/* ===== SPLASH SCREEN ===== */
#splash{position:fixed;inset:0;background:linear-gradient(145deg,#6B0F2A 0%,#9B1B3F 55%,#BC2950 100%);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s ease;overflow:hidden}
#splash.fade-out{opacity:0;pointer-events:none}
.splash-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:32px;font-weight:800;color:#fff;letter-spacing:-.02em;margin-top:24px;opacity:0;transform:translateY(10px);transition:opacity .5s .8s ease,transform .5s .8s ease}
.splash-title span{color:#F0C44C;font-style:italic}
.splash-sub{font-size:12px;color:rgba(255,255,255,.7);font-weight:700;text-transform:uppercase;letter-spacing:.18em;margin-top:6px;opacity:0;transition:opacity .5s 1.1s ease}
.splash-title.show,.splash-sub.show{opacity:1;transform:none}
/* Sofa SVG animation */
#sofa-wrap{position:relative;width:200px;height:130px}
#sofa-body{transform-origin:center bottom;animation:sofaBounceIn .7s cubic-bezier(.2,1.4,.4,1) .1s both}
@keyframes sofaBounceIn{from{opacity:0;transform:scale(.3) translateY(60px)}to{opacity:1;transform:scale(1) translateY(0)}}
.pillow{animation:pillowDrop .5s cubic-bezier(.2,1.4,.4,1) both}
.pillow:nth-child(1){animation-delay:.6s}
.pillow:nth-child(2){animation-delay:.75s}
@keyframes pillowDrop{from{opacity:0;transform:translateY(-30px) rotate(-15deg)}to{opacity:1;transform:translateY(0) rotate(0)}}
.person{animation:personSit .55s cubic-bezier(.2,1.4,.4,1) .9s both}
@keyframes personSit{from{opacity:0;transform:translateY(-40px) scale(.5)}to{opacity:1;transform:translateY(0) scale(1)}}
/* Particle dots */
.spark{position:absolute;border-radius:50%;animation:sparkPop .8s ease both}
@keyframes sparkPop{0%{opacity:0;transform:scale(0)}40%{opacity:1;transform:scale(1.3)}100%{opacity:0;transform:scale(1) translate(var(--tx),var(--ty))}}

<script>
var deals=[];
var archived=[];
var scouted=[];
var scoutLinks=[];
var queue=[];
var history={};
var daily={date:'',count:0,chased:0,replies:0,viewings:0,listed:0,sold:0,offers:0};
var settings={minMargin:80,monthlyTarget:500,deadCapDays:21,targetMarginPct:55,autoBackup:true,workerUrl:'',salary:28000,ebayFee:13.0};
var dealSort='health';
var dealFilter='all';
var viewMonth=null;
var savedCalc={buy:'',del:'',sell:'',fees:'0'};
var CALCSTORE='sitbackandco_calc_v4';
var editingScoutId=null;
var highlightedDay=null;
var archSearch='';
var archFilter='all';
var scoutSort='score';
var lastAnalysisResult=null;
var lastAnalysisImages=[];
var lastBackup=null;
var STORE='sofadesk_v4';
var ASTORE='sofadesk_archive_v4';
var SCSTORE='sofadesk_scout_v4';
var SLSTORE='sofadesk_scoutlinks_v4';
var QSTORE='sofadesk_queue_v4';
var HSTORE='sofadesk_history_v4';
var DSTORE='sofadesk_daily_v4';
var SSTORE='sofadesk_settings_v4';
var LBSTORE='sofadesk_lastbackup_v4';

function uid(){return 'd'+Date.now()+Math.random().toString(36).slice(2,7)}
function todayStr(){return new Date().toLocaleDateString('en-GB')}
function nowStamp(){var n=new Date();return n.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' '+n.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}


// Splash screen
function initSplash(){
  var s=document.getElementById('splash');
  if(!s)return;
  var t=document.querySelector('.splash-title');
  var sub=document.querySelector('.splash-sub');
  setTimeout(function(){if(t)t.classList.add('show');if(sub)sub.classList.add('show');},100);
  setTimeout(function(){s.classList.add('fade-out');setTimeout(function(){s.style.display='none';},650);},1800);
}

function storageWorks(){try{var k='__sbtest__';localStorage.setItem(k,'1');localStorage.removeItem(k);return true;}catch(e){return false;}}
function load(){
  initSplash();
  if(!storageWorks()){setTimeout(function(){alert('Heads up: this browser is blocking local storage (often private/incognito mode). Your data will NOT be saved between sessions. Open the app in a normal window, or host it online, to save your work.');},500);}
  try{var r=localStorage.getItem(STORE);if(r)deals=JSON.parse(r);}catch(e){deals=[];}
  try{var a=localStorage.getItem(ASTORE);if(a)archived=JSON.parse(a);}catch(e){archived=[];}
  try{var sc=localStorage.getItem(SCSTORE);if(sc)scouted=JSON.parse(sc);}catch(e){scouted=[];}
  try{var sl=localStorage.getItem(SLSTORE);if(sl)scoutLinks=JSON.parse(sl);}catch(e){scoutLinks=[];}
  try{var q=localStorage.getItem(QSTORE);if(q)queue=JSON.parse(q);}catch(e){queue=[];}
  try{var cc=localStorage.getItem(CALCSTORE);if(cc)savedCalc=JSON.parse(cc);}catch(e){}
  try{var hh=localStorage.getItem(HSTORE);if(hh)history=JSON.parse(hh);}catch(e){history={};}
  purgeOldHistory();
  try{var d=localStorage.getItem(DSTORE);if(d)daily=Object.assign(daily,JSON.parse(d));}catch(e){}
  try{var s=localStorage.getItem(SSTORE);if(s)settings=Object.assign(settings,JSON.parse(s));}catch(e){}
  try{var lb=localStorage.getItem(LBSTORE);if(lb)lastBackup=lb;}catch(e){}
  if(daily.date!==todayStr()){
    if(daily.date){history[daily.date]={count:daily.count||0,chased:daily.chased||0,replies:daily.replies||0,viewings:daily.viewings||0,listed:daily.listed||0,sold:daily.sold||0,offers:daily.offers||0};saveHistory();}
    daily={date:todayStr(),count:0,chased:0,replies:0,viewings:0,listed:0,sold:0,offers:0};saveDaily();
  }
  render();
}
function save(){try{localStorage.setItem(STORE,JSON.stringify(deals));localStorage.setItem(ASTORE,JSON.stringify(archived));localStorage.setItem(SCSTORE,JSON.stringify(scouted));}catch(e){}maybeAutoBackup();render();}
function saveArchive(){try{localStorage.setItem(ASTORE,JSON.stringify(archived));}catch(e){}}
function saveScout(){try{localStorage.setItem(SCSTORE,JSON.stringify(scouted));}catch(e){}}
function saveScoutLinks(){try{localStorage.setItem(SLSTORE,JSON.stringify(scoutLinks));}catch(e){}}
function saveQueue(){try{localStorage.setItem(QSTORE,JSON.stringify(queue));}catch(e){}}
function parkLink(){var i=document.getElementById('link-park');if(!i||!i.value.trim())return;var v=i.value.trim();if(scoutLinks.indexOf(v)===-1)scoutLinks.unshift(v);i.value='';saveScoutLinks();render();toast('Link parked — send it to Claude to score');}
function unparkLink(idx){scoutLinks.splice(idx,1);saveScoutLinks();render();}
function copyLink(idx){var v=scoutLinks[idx];if(navigator.clipboard)navigator.clipboard.writeText(v).then(function(){toast('Copied — paste to Claude in chat');});else toast('Select and copy the link');}
function saveHistory(){try{localStorage.setItem(HSTORE,JSON.stringify(history));}catch(e){}}
// Parse dd/mm/yyyy -> Date
function parseDMY(s){var p=s.split('/');return new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));}
// Remove any saved day older than 61 days
function purgeOldHistory(){
  var cutoff=Date.now()-61*86400000;var changed=false;
  Object.keys(history).forEach(function(k){
    try{if(parseDMY(k).getTime()<cutoff){delete history[k];changed=true;}}catch(e){}
  });
  if(changed)saveHistory();
}
// snapshot today's live counts into history continuously; preserve any note already saved
function syncTodayHistory(){
  var t=todayStr();var existing=history[t]||{};
  history[t]={
    count:daily.count||0,chased:daily.chased||0,replies:daily.replies||0,viewings:daily.viewings||0,
    listed:daily.listed||0,sold:daily.sold||0,offers:daily.offers||0,
    note:existing.note||'',
    savedProfit:(function(){return deals.filter(function(d){return d.status==='sold'&&d.soldTime&&new Date(d.soldTime).toLocaleDateString('en-GB')===t;}).reduce(function(a,d){return a+(profit(d)||0);},0);})(),
    activeCount:deals.filter(function(d){return d.status!=='sold'&&d.status!=='dead';}).length
  };
  saveHistory();
}
function saveDayNote(date,txt){if(!history[date])history[date]={};history[date].note=txt;saveHistory();}
var viewingDay=null;
function openDay(date){viewingDay=date;render();}
function closeDay(){viewingDay=null;render();}
function saveDaily(){try{localStorage.setItem(DSTORE,JSON.stringify(daily));}catch(e){}}
function saveSettings(){try{localStorage.setItem(SSTORE,JSON.stringify(settings));}catch(e){}}

function fmt(n){var v=parseFloat(n)||0;return(v>=0?'£':'-£')+Math.abs(v).toFixed(0);}
function fmt2(n){var v=parseFloat(n)||0;return(v>=0?'£':'-£')+Math.abs(v).toFixed(2);}

function profit(d){var b=parseFloat(d.buy)||0,del=parseFloat(d.del)||0,f=parseFloat(d.fees)||0,s=parseFloat(d.sell)||0;if(!s)return null;return s-b-del-f;}
function projProfit(d){var b=parseFloat(d.buy)||0,del=parseFloat(d.del)||0,f=parseFloat(d.fees)||0,l=parseFloat(d.listed)||0;if(!l)return null;return l-b-del-f;}
function totalCost(d){return (parseFloat(d.buy)||0)+(parseFloat(d.del)||0)+(parseFloat(d.fees)||0);}
function marginPct(d){var p=profit(d),s=parseFloat(d.sell)||0;if(p===null||!s)return null;return (p/s)*100;}

function daysLabel(ts){var d=Math.floor((Date.now()-ts)/86400000);if(d===0)return'Today';if(d===1)return'1d';return d+'d';}
function daysSince(ts){return Math.floor((Date.now()-ts)/86400000);}

function hrsSinceMsg(d){if(!d.msgTime)return null;return (Date.now()-d.msgTime)/3600000;}
function isOverdue(d){if(d.status==='sold'||d.status==='dead')return false;if(d.replied)return false;var h=hrsSinceMsg(d);return h!==null&&h>=48;}
function isDeadCap(d){if(d.status!=='listed'&&d.status!=='negotiating')return false;if(!(parseFloat(d.buy)>0))return false;var since=d.boughtTime||d.ts;return daysSince(since)>=settings.deadCapDays;}

// Days to sell (for sold deals)
function daysToSell(d){if(d.status!=='sold'||!d.soldTime)return null;var start=d.boughtTime||d.ts;return Math.max(0,Math.round((d.soldTime-start)/86400000));}
function profitPerHour(d){var p=profit(d),h=parseFloat(d.hrs)||0;if(p===null||h<=0)return null;return p/h;}

var CHECKS=[
  'Confirmed still available','6–8 photos received in good lighting','No structural damage or broken frame',
  'No smoke smell confirmed','Pets/hair situation acceptable','Dimensions confirmed — fits doorways',
  'Disassembles if corner sofa','AnyVan or Shiply quote obtained','Margin clears my minimum after all costs','Seller has urgency / flexible on price'
];

// Deal health score 0-100
function healthScore(d){
  if(d.status==='sold')return 100;
  if(d.status==='dead')return 0;
  var score=0;
  var chks=(d.chks||[]).length;
  score+=chks*5; // up to 50 for checklist
  // margin component up to 30
  var p=projProfit(d);
  if(p!==null){
    if(p>=settings.minMargin)score+=30;
    else if(p>=0)score+=15;
  } else { score+=10; }
  // freshness up to 20
  var age=daysSince(d.boughtTime||d.ts);
  if(age<7)score+=20;
  else if(age<14)score+=12;
  else if(age<settings.deadCapDays)score+=6;
  return Math.min(100,score);
}
function healthClass(s){return s>=70?'hp-good':s>=40?'hp-mid':'hp-bad';}
function healthLabel(s){return s>=70?'Healthy':s>=40?'Watch':'At risk';}

function tagHTML(s){var l={sourcing:'Sourcing',listed:'Listed',negotiating:'Negotiating',sold:'Sold',dead:'Dead'};return'<span class="tag tag-'+s+'">'+(l[s]||s)+'</span>';}

function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1800);}

function dealCard(d){
  var p=profit(d);
  var pp=projProfit(d);
  var displayP = p!==null ? p : pp;
  var pStr = p!==null ? fmt(p) : (pp!==null ? fmt(pp)+' proj' : 'Pending');
  var pClass = displayP===null?'profit-pending':displayP>=0?'profit-pos':'profit-neg';
  var dotC={sourcing:'dot-sourcing',listed:'dot-listed',negotiating:'dot-negotiating',sold:'dot-sold',dead:'dot-dead'}[d.status||'sourcing'];
  var upds=d.upds||[],chks=d.chks||[];
  var chksDone=chks.length,chksPct=Math.round((chksDone/10)*100);
  var overdue=isOverdue(d);
  var deadcap=isDeadCap(d);
  var hs=healthScore(d);
  var pph=profitPerHour(d);
  var dts=daysToSell(d);

  var checksHTML=CHECKS.map(function(c,i){
    var on=chks.indexOf(i)>-1;
    return'<div class="cl-item" onclick="toggleCheck(\''+d.id+'\','+i+')"><div class="cl-box'+(on?' on':'')+'">'+(on?'✓':'')+'</div><span class="cl-text'+(on?' done':'')+'">'+c+'</span></div>';
  }).join('');

  var updsHTML=upds.length?upds.map(function(u){return'<div class="upd-row"><div class="upd-time">'+u.t+'</div><div class="upd-text">'+u.text+(archSearch?'<button class="btn btn-xs btn-danger" onclick="archSearch=\'\';archFilter=\'all\';render()" style="white-space:nowrap">Clear</button>':'')+'</div></div>';}).join(''):'<div style="font-size:13px;color:#bcc0c8;padding:6px 0">No updates yet</div>';

  // margin box (actual or projected)
  var marginBox='';
  if(p!==null){
    var mp=marginPct(d);
    var cls=p>=settings.minMargin?'margin-good':p>=0?'margin-warn':'margin-bad';
    var vcls=p>=settings.minMargin?'mv-g':p>=0?'mv-w':'mv-b';

function render(){
  var active=deals.filter(function(d){return d.status!=='sold'&&d.status!=='dead';});
  var sold=deals.filter(function(d){return d.status==='sold';});
  var dead=deals.filter(function(d){return d.status==='dead';});
  var overdue=deals.filter(isOverdue);
  var deadcaps=deals.filter(isDeadCap);

  var totProfit=sold.reduce(function(a,d){var p=profit(d);return a+(p||0);},0);
  // Cash tied up = buy+del+fees of unsold deals where bought
  var tiedUp=active.filter(function(d){return parseFloat(d.buy)>0;}).reduce(function(a,d){return a+totalCost(d);},0);
  var depositsHeld=active.reduce(function(a,d){return a+(parseFloat(d.deposit)||0);},0);

  renderDashboard(active,sold,overdue,deadcaps,totProfit,tiedUp);
  renderDeals();
  renderMoney(active,sold,totProfit,tiedUp,depositsHeld);
  renderInsights(sold);
  document.getElementById('view-analyse').innerHTML=analyseHTML();
  document.getElementById('view-scout').innerHTML=scoutHTML();
  document.getElementById('view-tracker').innerHTML=(viewingDay?dayDetailHTML(viewingDay):trackerHTML());
  document.getElementById('view-tools').innerHTML=toolsHTML();
  document.getElementById('view-archive').innerHTML=archiveHTML();
}


// ===== Best-use-of-cash advisor =====
function expectedProfit(d){
  // prefer projected at listed; else sweet-spot from ebay avg; else null
  var cost=totalCost(d);
  var listed=parseFloat(d.listed)||0;
  if(listed>0)return listed-cost;
  var avg=parseFloat(d.ebayAvg)||0;
  if(avg>0)return Math.round(avg*0.96)-cost;
  return null;
}
function capitalNeeded(d){
  // if already bought, capital is committed; advisor focuses on deals needing spend
  var buy=parseFloat(d.buy)||0;var del=parseFloat(d.del)||0;var fees=parseFloat(d.fees)||0;
  return buy+del+fees;
}
function cashAdvisorHTML(active){
  // candidates: not yet bought (sourcing/negotiating) with a buy price entered and an expected profit
  var cands=active.filter(function(d){
    return (d.status==='sourcing'||d.status==='negotiating') && (parseFloat(d.buy)>0) && expectedProfit(d)!==null && !d.boughtTime;
  }).map(function(d){
    var ep=expectedProfit(d);var cap=capitalNeeded(d)||1;
    var roi=ep/cap; // return on capital
    return {d:d,ep:ep,cap:cap,roi:roi};
  }).filter(function(x){return x.ep>0;}).sort(function(a,b){return b.roi-a.roi;});
  if(cands.length===0)return '';
  var rows=cands.slice(0,4).map(function(x,i){
    var pctRoi=Math.round(x.roi*100);
    return '<div style="display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)">'
      +'<div style="font-family:\'Fraunces\',serif;font-size:17px;font-weight:600;color:var(--burg);min-width:24px">'+(i+1)+'</div>'
      +'<div style="flex:1;min-width:0"><div style="font-family:\'Fraunces\',serif;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(x.d.name||"Sofa")+'</div>'
      +'<div style="font-size:11.5px;color:var(--muted)">Tie up '+fmt(x.cap)+' → make '+fmt(x.ep)+'</div></div>'
      +'<div style="text-align:right"><div style="font-family:\'Fraunces\',serif;font-size:16px;font-weight:700;color:var(--green)">'+pctRoi+'%</div><div style="font-size:10px;color:var(--muted)">on cash</div></div>'
      +'</div>';
  }).join('');
  return '<div class="card" style="border-left:4px solid var(--green)"><div class="card-title">💷 Best use of your cash now</div>'
    +'<div class="card-desc">Of the deals you could buy, these give the best return on the money you put in. Do the top one first to recycle your float fastest.</div>'
    +rows+'</div>';
}

  var toList=active.filter(function(d){return d.status==='sourcing'&&(d.chks||[].length)>=7&&d.replied;});
  var readyList=active.filter(function(d){return d.replied&&(d.chks||[]).length>=8&&d.status==='sourcing';});

  // First-run welcome card
  var welcomeCard='';

    welcomeCard='<div class="card" style="border-left:4px solid var(--burg);background:linear-gradient(135deg,var(--pink),var(--card));margin-bottom:18px">'
      +'<div style="font-size:22px;margin-bottom:8px">&#127681;</div>'
      +'<div class="card-title" style="font-size:18px">Welcome to Sit Back &amp; Co</div>'
      +'<div class="card-desc">Your sofa flipping command centre. Add your first deal to get started &#8212; track it from sourcing to sold, analyse screenshots with AI, and watch the profits roll in.</div>'

      +'</div>';
  }
  var dash=welcomeCard+'<div class="summary-card"><div class="summary-title">📋 Today\'s briefing</div>'+summaryRows+'</div>';
  dash+=cashAdvisorHTML(active);

  dash+='<div class="daily-card"><div class="daily-top"><div class="daily-title">Daily outreach</div><div class="daily-date">'+daily.date+'</div></div>'

    +'<div class="daily-bar"><div class="daily-fill" style="width:'+pct+'%"></div></div>'

  dash+='<div class="stats-grid">'

    +'<div class="stat"><div class="stat-label">Cash tied up</div><div class="stat-val amber">'+fmt(tiedUp)+'</div><div class="stat-sub">in unsold stock</div></div>'
    +'<div class="stat"><div class="stat-label">Net profit</div><div class="stat-val '+(totProfit>=0?'green':'red')+'">'+fmt(totProfit)+'</div><div class="stat-sub">'+sold.length+' sold</div></div>'
    +'<div class="stat"><div class="stat-label">This month</div><div class="stat-val blue">'+fmt(monthProfit())+'</div><div class="stat-sub">of £'+settings.monthlyTarget+' target</div></div>'
    +'</div>';

  // Pipeline
  var st={sourcing:0,listed:0,negotiating:0,sold:0,dead:0};

function setDealSort(s){dealSort=s;renderDeals();}
function setDealFilter(f){dealFilter=f;renderDeals();}
function renderDeals(){
  var filtered=deals.filter(function(d){
    if(dealFilter==='active')return d.status!=='sold'&&d.status!=='dead';
    if(dealFilter==='sold')return d.status==='sold';
    if(dealFilter==='dead')return d.status==='dead';
    return true;
  });
  var sorted=filtered.slice().sort(function(a,b){
    if(dealSort==='health')return healthScore(b)-healthScore(a);
    if(dealSort==='profit'){var pa=(profit(a)||projProfit(a)||0),pb=(profit(b)||projProfit(b)||0);return pb-pa;}
    if(dealSort==='date')return b.ts-a.ts;
    if(dealSort==='status'){var ord={sourcing:0,listed:1,negotiating:2,sold:3,dead:4};return (ord[a.status||'sourcing']||0)-(ord[b.status||'sourcing']||0);}
    return 0;
  });
  var sl={health:'Health',profit:'Profit',date:'Newest',status:'Status'};
  var fl={all:'All',active:'Active',sold:'Sold',dead:'Dead'};
  var sb=Object.keys(sl).map(function(s){return '<button class="sort-btn'+(dealSort===s?' sort-active':'')+'" onclick="setDealSort(\''+s+'\')">'+sl[s]+'</button>';}).join('');
  var fb=Object.keys(fl).map(function(f){return '<button class="sort-btn'+(dealFilter===f?' sort-active':'')+'" onclick="setDealFilter(\''+f+'\')">'+fl[f]+'</button>';}).join('');
  var dealSearch=document.getElementById('deal-search')?document.getElementById('deal-search').value.toLowerCase():'';
  sorted=sorted.filter(function(d){if(!dealSearch)return true;return((d.name||'')+(d.brand||'')+(d.seller||'')+(d.area||'')).toLowerCase().includes(dealSearch);});
  var allHTML='<div class="section-header"><div class="section-title">Deals ('+sorted.length+(sorted.length!==deals.length?'/'+deals.length:'')+')</div><button class="btn btn-primary" onclick="newDeal()">+ New</button></div>';
  allHTML+='<div style="margin-bottom:10px"><input id="deal-search" placeholder="&#128269; Search by name, brand, seller, area..." oninput="renderDeals()" value="'+(document.getElementById('deal-search')?document.getElementById('deal-search').value:'')+' " style="width:100%;font-size:13px;padding:10px 13px;border:1.5px solid var(--line-2);border-radius:12px;background:var(--card);font-family:\'Plus Jakarta Sans\',sans-serif"></div>';
  allHTML+='<div class="sort-bar"><div class="sort-group"><span class="sort-label">Sort</span>'+sb+'</div><div class="sort-group"><span class="sort-label">Filter</span>'+fb+'</div></div>';
  if(sorted.length===0)allHTML+='<div class="empty"><div class="empty-title">No deals here</div><div class="empty-sub">Try a different filter</div></div>';
  else allHTML+=sorted.map(dealCard).join('');
  document.getElementById('view-deals').innerHTML=allHTML;
}

function shiftMonth(dir){
  var now=new Date();
  var vm=viewMonth||{y:now.getFullYear(),m:now.getMonth()};
  var d2=new Date(vm.y,vm.m+dir,1);
  var nm={y:d2.getFullYear(),m:d2.getMonth()};
  if(nm.y>now.getFullYear()||(nm.y===now.getFullYear()&&nm.m>now.getMonth()))viewMonth=null;
  else viewMonth=nm;
  render();
}
function monthProfit(){
  var now=new Date();var m=now.getMonth(),y=now.getFullYear();
  return deals.filter(function(d){return d.status==='sold'&&d.soldTime;}).filter(function(d){var sd=new Date(d.soldTime);return sd.getMonth()===m&&sd.getFullYear()===y;}).reduce(function(a,d){return a+(profit(d)||0);},0);
}

function renderInsights(sold){
  var html='<div class="section-title" style="margin-bottom:12px">Profitability intelligence</div>';

  if(sold.length===0){
    html+='<div class="empty"><div class="empty-title">No data yet</div><div class="empty-sub">Insights appear once you\'ve sold a few sofas. Mark deals as Sold to build your numbers.</div></div>';
    // Worst performers
  var worst=sold.slice().filter(function(d){return profit(d)!==null;}).sort(function(a,b){return (profit(a)||0)-(profit(b)||0);}).slice(0,3);
  if(worst.length>=2){
    html+='<div class="card"><div class="card-title">Deals to avoid</div><div class="card-desc">These delivered the worst returns. Recognise the pattern — type, brand, or condition to deprioritise.</div>';
    worst.forEach(function(d){
      var p=profit(d)||0;
      var pph=profitPerHour(d);
      html+='<div class="insight-row"><div><div class="insight-name">'+(d.name||'Sofa')+'</div><div class="insight-meta">'+(d.type||'')+(d.brand?' · '+d.brand:'')+(pph!==null?' · '+fmt2(pph)+'/hr':'')+'</div></div><div class="insight-val" style="color:var(--red)">'+fmt(p)+'</div></div>';
    });
    html+='</div>';
  }
  document.getElementById('view-insights').innerHTML=html;
    return;
  }

  var totProfit=sold.reduce(function(a,d){return a+(profit(d)||0);},0);
  var totHrs=sold.reduce(function(a,d){return a+(parseFloat(d.hrs)||0);},0);
  var avgPph=totHrs>0?totProfit/totHrs:0;
  var margins=sold.map(marginPct).filter(function(x){return x!==null;});
  var avgMargin=margins.length?margins.reduce(function(a,b){return a+b;},0)/margins.length:0;
  var dtsList=sold.map(daysToSell).filter(function(x){return x!==null;});
  var avgDts=dtsList.length?dtsList.reduce(function(a,b){return a+b;},0)/dtsList.length:0;
  var avgProfit=totProfit/sold.length;

  html+='<div class="stats-grid">'
    +'<div class="stat"><div class="stat-label">Profit / hour</div><div class="stat-val green">'+fmt2(avgPph)+'</div><div class="stat-sub">your real wage</div></div>'
    +'<div class="stat"><div class="stat-label">Avg margin</div><div class="stat-val">'+avgMargin.toFixed(0)+'%</div><div class="stat-sub">per sofa</div></div>'
    +'<div class="stat"><div class="stat-label">Avg days to sell</div><div class="stat-val">'+avgDts.toFixed(0)+'</div><div class="stat-sub">buy → sold</div></div>'
    +'<div class="stat"><div class="stat-label">Avg profit</div><div class="stat-val green">'+fmt(avgProfit)+'</div><div class="stat-sub">per deal</div></div>'
    +'</div>';

  // profit/hour context
  html+='<div class="card" style="padding:14px 16px;margin-bottom:15px"><div style="font-size:12.5px;color:#5b616b;line-height:1.55">Your day job pays roughly <b>£'+(28000/52/37.5).toFixed(0)+'/hr</b> before tax. This side hustle makes you <b style="color:var(--green)">'+fmt2(avgPph)+'/hr</b>. '+(avgPph>=hrlyRate*1.5?'Exceptional — this earns '+(avgPph/hrlyRate).toFixed(1)+'x your day rate. Scale it.':avgPph>=hrlyRate?'Strong — beating your day rate. Protect this time.':avgPph>=hrlyRate*0.6?'Solid, but below your day rate. Chase higher-margin deals.':'Below your day rate — focus on deals clearing £80+ fast.')+'</div></div>';

  // By CATEGORY — which earns most per hour (key for "where to spend my time")
  var byCat={};
  sold.forEach(function(d){
    var c=(d.category||'Sofa').trim()||'Sofa';
    if(!byCat[c])byCat[c]={profit:0,count:0,hrs:0};
    byCat[c].profit+=profit(d)||0;byCat[c].count++;byCat[c].hrs+=parseFloat(d.hrs)||0;
  });
  var catArr=Object.keys(byCat).map(function(c){
    var o=byCat[c];return {name:c,profit:o.profit,count:o.count,pph:o.hrs>0?o.profit/o.hrs:null,avg:o.profit/o.count};
  }).sort(function(a,b){return (b.pph||0)-(a.pph||0);});
  if(catArr.length>1){
    html+='<div class="card"><div class="card-title">Best category by profit/hour</div><div class="card-desc">Your time is the real limit. Put it where it pays best.</div>';
    catArr.forEach(function(c,i){
      html+='<div class="insight-row"><div><div class="insight-name">'+c.name+(i===0?'<span class="badge-best">TOP £/HR</span>':'')+'</div><div class="insight-meta">'+c.count+' sold · '+fmt(c.profit)+' total · avg '+fmt(c.avg)+'/deal</div></div><div class="insight-val iv-green">'+(c.pph!==null?fmt2(c.pph)+'/hr':'—')+'</div></div>';
    });
    html+='</div>';
  }

  // By brand
  var byBrand={};
  sold.forEach(function(d){var b=(d.brand||'Unknown').trim()||'Unknown';if(!byBrand[b])byBrand[b]={profit:0,count:0};byBrand[b].profit+=profit(d)||0;byBrand[b].count++;});
  var brandArr=Object.keys(byBrand).map(function(b){return{name:b,profit:byBrand[b].profit,count:byBrand[b].count,avg:byBrand[b].profit/byBrand[b].count};}).sort(function(a,b){return b.avg-a.avg;});
  if(brandArr.length>0){
    html+='<div class="card"><div class="card-title">Best brands by avg profit</div><div class="card-desc">Chase these — they give you the best return per deal.</div>';
    brandArr.slice(0,6).forEach(function(b,i){
      html+='<div class="insight-row"><div><div class="insight-name">'+b.name+(i===0?'<span class="badge-best">BEST</span>':'')+'</div><div class="insight-meta">'+b.count+' sold · '+fmt(b.profit)+' total</div></div><div class="insight-val iv-green">'+fmt(b.avg)+'</div></div>';
    });
    html+='</div>';
  }

  // By type
  var byType={};
  sold.forEach(function(d){var t=(d.type||'Unknown').trim()||'Unknown';if(!byType[t])byType[t]={profit:0,count:0};byType[t].profit+=profit(d)||0;byType[t].count++;});
  var typeArr=Object.keys(byType).map(function(t){return{name:t,profit:byType[t].profit,count:byType[t].count,avg:byType[t].profit/byType[t].count};}).sort(function(a,b){return b.avg-a.avg;});
  if(typeArr.length>0&&typeArr[0].name!=='Unknown'){
    html+='<div class="card"><div class="card-title">Best sofa types by avg profit</div><div class="card-desc">The shapes worth prioritising when you source.</div>';
    typeArr.slice(0,6).forEach(function(t,i){
      html+='<div class="insight-row"><div><div class="insight-name">'+t.name+(i===0?'<span class="badge-best">BEST</span>':'')+'</div><div class="insight-meta">'+t.count+' sold · '+fmt(t.profit)+' total</div></div><div class="insight-val iv-green">'+fmt(t.avg)+'</div></div>';
    });
    html+='</div>';
  }

  // Best single deals
  var ranked=sold.slice().sort(function(a,b){return (profit(b)||0)-(profit(a)||0);}).slice(0,5);
  html+='<div class="card"><div class="card-title">Top deals</div>';
  ranked.forEach(function(d){
    var pph=profitPerHour(d);
    html+='<div class="insight-row"><div><div class="insight-name">'+(d.name||'Sofa')+'</div><div class="insight-meta">'+(pph!==null?fmt2(pph)+'/hr · ':'')+(daysToSell(d)!==null?daysToSell(d)+'d to sell':'')+'</div></div><div class="insight-val iv-green">'+fmt(profit(d))+'</div></div>';
  });
  html+='</div>';

  // Worst performers
  var worst=sold.slice().filter(function(d){return profit(d)!==null;}).sort(function(a,b){return (profit(a)||0)-(profit(b)||0);}).slice(0,3);
  if(worst.length>=2){
    html+='<div class="card"><div class="card-title">Deals to avoid</div><div class="card-desc">These delivered the worst returns. Recognise the pattern — type, brand, or condition to deprioritise.</div>';
    worst.forEach(function(d){
      var p=profit(d)||0;
      var pph=profitPerHour(d);
      html+='<div class="insight-row"><div><div class="insight-name">'+(d.name||'Sofa')+'</div><div class="insight-meta">'+(d.type||'')+(d.brand?' · '+d.brand:'')+(pph!==null?' · '+fmt2(pph)+'/hr':'')+'</div></div><div class="insight-val" style="color:var(--red)">'+fmt(p)+'</div></div>';
    });
    html+='</div>';
  }
  document.getElementById('view-insights').innerHTML=html;
}

function buildBackupObject(){
  return {
    app:'Sit Back & Co',version:'v5',exportedAt:new Date().toISOString(),
    deals:deals,archived:archived,scouted:scouted,scoutLinks:scoutLinks,queue:queue,history:history,daily:daily,settings:settings
  };
}
function downloadBackup(silent){
  try{
    var data=JSON.stringify(buildBackupObject(),null,2);
    var blob=new Blob([data],{type:'application/json'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;a.download='sitbackandco-backup-'+todayStr().replace(/\//g,'-')+'.json';a.click();
    URL.revokeObjectURL(url);
    lastBackup=new Date().toISOString();
    try{localStorage.setItem(LBSTORE,lastBackup);}catch(e){}
    if(!silent)toast('Backup downloaded — keep it safe');
    render();
  }catch(e){if(!silent)toast('Backup failed');}
}
// Auto-backup: offers a fresh file at most once every 10 changes or 30 min, only if data exists
var changeCounter=0;
function maybeAutoBackup(){
  if(!settings.autoBackup)return;
  if(deals.length===0&&archived.length===0)return;
  changeCounter++;
  var now=Date.now();
  var lastTs=lastBackup?new Date(lastBackup).getTime():0;
  if(changeCounter>=10 || (now-lastTs)>1800000){
    changeCounter=0;
    downloadBackup(true);
  }
}
function restoreBackup(input){
  var file=input.files&&input.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var obj=JSON.parse(e.target.result);
      if(!obj||(!obj.deals&&!obj.archived))throw new Error('not a Sit Back & Co backup');
      var mode=confirm('Restore this backup?\n\nOK = MERGE with your current data (keeps both)\nCancel = REPLACE everything with the backup');
      if(mode){
        // merge — avoid duplicate ids
        var ids={};deals.forEach(function(d){ids[d.id]=1;});
        (obj.deals||[]).forEach(function(d){if(!ids[d.id])deals.push(d);});
        var aids={};archived.forEach(function(d){aids[d.id]=1;});
        (obj.archived||[]).forEach(function(d){if(!aids[d.id])archived.push(d);});
        toast('Backup merged in');
      } else {
        deals=obj.deals||[];archived=obj.archived||[];
        if(obj.scouted)scouted=obj.scouted;
        if(obj.scoutLinks)scoutLinks=obj.scoutLinks;
        if(obj.queue)queue=obj.queue;
        if(obj.history)history=obj.history;
        if(obj.settings)settings=Object.assign(settings,obj.settings);
        if(obj.daily&&obj.daily.date===todayStr())daily=obj.daily;
        toast('Data restored from backup');
      }
      save();saveDaily();saveSettings();
    }catch(err){toast('Not a valid backup file');}
    input.value='';
  };
  reader.readAsText(file);
}

// ============================================================
// SCOUT — paste listings, auto-score & rank by resale potential
// ============================================================
var KNOWN_BRANDS=['dfs','sofology','made','made.com','west elm','john lewis','habitat','heals','heal\'s','next','loaf','swoon','ikea','barker','barker and stonehouse','furniture village','natuzzi','laura ashley','marks','m&s','arlo','snug','willow','collins','multiyork','duresta','g plan','ercol','parker knoll','dunelm','argos','oak furnitureland','oak furniture land','next home','wayfair','homesense','cox and cox'];
var QUALITY_WORDS=['leather','velvet','solid wood','oak','chesterfield','wool','linen','feather','down-filled','hardwood'];

function scoreListing(s){
  // s: {price, condition, brand, desc, photos, upholstery}
  var score=0; var reasons=[];
  var price=parseFloat(s.price)||0;
  // 1. Lowest price (max 30) — cheaper scores higher within £10-150 band
  if(price>0){
    var priceScore=Math.round(Math.max(0,Math.min(30,30*(150-price)/140)));
    score+=priceScore; if(priceScore>=22)reasons.push('low price');
  }
  // 2. Condition (max 25)
  var c=(s.condition||'').toLowerCase();
  if(c.indexOf('like new')>-1||c.indexOf('excellent')>-1){score+=25;reasons.push('top condition');}
  else if(c.indexOf('very good')>-1){score+=20;}
  else if(c.indexOf('good')>-1){score+=15;}
  else if(c.indexOf('used')>-1){score+=8;}
  // 3. Known brand (max 20)
  var text=((s.brand||'')+' '+(s.desc||'')).toLowerCase();
  var brandHit=KNOWN_BRANDS.find(function(b){return text.indexOf(b)>-1;});
  if(brandHit){score+=20;reasons.push(brandHit+' brand');}
  // 4. Quality upholstery (max 15)
  var qHit=QUALITY_WORDS.find(function(q){return text.indexOf(q)>-1;});
  if(qHit){score+=15;reasons.push(qHit);}
  // 5. Photos (max 5)
  var photos=parseInt(s.photos)||0;
  if(photos>=4)score+=5; else if(photos>=1)score+=3;
  // 6. Description detail (max 5)
  var dlen=(s.desc||'').trim().length;
  if(dlen>=120)score+=5; else if(dlen>=40)score+=3;
  if(chksDone>=4&&brandHit&&qHit&&photos>=4&&dlen>=120)score+=5;
  if(chksDone>=4&&brandHit&&qHit&&photos>=4&&dlen>=120)score+=5;
  // bonus 5 when all quality signals present
  if(brandHit&&qHit&&photos>=4&&dlen>=120)score+=5;
  return {score:Math.min(100,score),reasons:reasons};
}

function meetsCriteria(s){
  var price=parseFloat(s.price)||0;
  var c=(s.condition||'').toLowerCase();
  if(price<10||price>150)return {ok:false,why:'price outside £10–150'};
  if(c.indexOf('damag')>-1||c.indexOf('parts')>-1||c.indexOf('repair')>-1)return {ok:false,why:'damaged / for parts'};
  if(!((parseInt(s.photos)||0)>=1))return {ok:false,why:'no photo'};
  if(((s.desc||'').trim().length)<20)return {ok:false,why:'no real description'};
  return {ok:true};
}

function exportScoutCSV(){

    if(scoutSort==='price')return (parseFloat(a.price)||0)-(parseFloat(b.price)||0);

  };

function updQueue(id,f,v){var it=queue.find(function(x){return x.id===id;});if(it){it[f]=v;saveQueue();}}

// Auto-generated prompt for Claude — the "sales manager brief"
function buildPrompt(it){
  var base="Act as my sofa-reselling sales manager. ";
  if(it.kind==='screenshot'){
    base+="I'm attaching a screenshot of a sofa listing. ";
  } else {
    base+="Here's a sofa listing link: "+(it.link||'[paste link]')+" (if you can't open it, I'll paste the details). ";
  }
  base+="Give me the full desk verdict: (1) realistic resale value range, (2) my profit after ~£85 AnyVan delivery if I buy at the asking price, (3) eBay sold-price guidance for this type, (4) clear pros and cons of this specific sofa, (5) a BUY / LOWBALL / PASS call with target buy price, (6) a ready-to-send negotiation message to the seller, and (7) anything else I should know — brand value, how fast it'll sell, splitting potential, fixable faults. Be specific with numbers.";
  return base;
}
function copyPrompt(id){
  var it=queue.find(function(x){return x.id===id;});if(!it)return;
  var p=buildPrompt(it);
  if(navigator.clipboard)navigator.clipboard.writeText(p).then(function(){toast('Prompt copied — paste to Claude in chat');});
  else toast('Select & copy the prompt text');
}

function fileToScout(id){
  var it=queue.find(function(x){return x.id===id;});if(!it)return;
  var s={
    name:it.name||'Sofa from analysis',
    price:it.price||'',
    condition:'Good',
    brand:'',area:'',market:it.kind==='link'?'Open site':'Facebook',
    url:it.link||'',
    desc:(it.pros?('Pros: '+it.pros+'. '):'')+(it.cons?('Cons: '+it.cons+'.'):'')||it.notes||'Analysed listing',
    photos:'4'
  };
  var sc=scoreListing(s);
  s.score=sc.score;s.reasons=sc.reasons;s.id=uid();s.added=Date.now();
  s.resale=it.resale;s.estProfit=it.profit;
  scouted.unshift(s);saveScout();
  it.status='filed';saveQueue();
  render();toast('Filed to Scout — scored '+sc.score+'/100');
}

function toggleQueue(id){var it=queue.find(function(x){return x.id===id;});if(it){it._o=!it._o;saveQueue();render();}}


// ============================================================
// LIVE AI ANALYSIS — upload up to 8 screenshots -> Worker (Claude) -> verdict in-app
// ============================================================
var liveResult=null;
var liveBusy=false;
var liveImages=[]; // array of {data, mime, name}
var MAX_IMAGES=8;

function fileToBase64(file){
  return new Promise(function(res,rej){
    var r=new FileReader();
    r.onload=function(){var s=r.result;var i=s.indexOf(',');res({data:s.slice(i+1),mime:(s.slice(5,i).split(';')[0]||'image/jpeg'),preview:s});};
    r.onerror=rej;r.readAsDataURL(file);
  });
}

async function addLiveImages(input){
  if(!input.files||!input.files.length)return;
  var files=Array.prototype.slice.call(input.files);
  for(var i=0;i<files.length;i++){
    if(liveImages.length>=MAX_IMAGES){toast('Max '+MAX_IMAGES+' screenshots');break;}
    if(!files[i].type.startsWith('image/'))continue;
    try{var enc=await fileToBase64(files[i]);liveImages.push(enc);}catch(e){}
  }
  input.value='';
  render();
  toast(liveImages.length+' screenshot'+(liveImages.length!==1?'s':'')+' added');
}
function removeLiveImage(idx){liveImages.splice(idx,1);render();}
function clearLiveImages(){liveImages=[];liveResult=null;render();}

async function runLiveAnalysis(){
  var priceInput=document.getElementById('live-price');
  var detailInput=document.getElementById('live-detail');
  if(!settings.workerUrl){toast('Add your Worker URL in Settings first');return;}
  if(!liveImages.length){toast('Add at least one screenshot');return;}
  liveBusy=true;liveResult=null;render();
  try{
    var resp=await fetch(settings.workerUrl,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        images:liveImages.map(function(im){return {data:im.data,mimeType:im.mime};}),
        // keep single-image field for backward compatibility
        image:liveImages[0].data,mimeType:liveImages[0].mime,
        askingPrice:(priceInput?priceInput.value:''),details:(detailInput?detailInput.value:'')
      })
    });
    var out=await resp.json();
    if(out&&out.ok&&out.verdict){liveResult=out.verdict;toast('Analysis complete');}
    else if(out&&out.raw){liveResult={_parseError:true,raw:out.raw,name:'Could not parse'};toast('Response received — see raw output below');}
    else{toast('Error: '+(out.error||'unknown')+(out.detail?' — '+String(out.detail).slice(0,60):''));}
  }catch(e){toast('Connection failed — check Worker URL');}
  liveBusy=false;render();
}

function recallAnalysis(){
  if(!lastAnalysisResult)return;
  liveResult=JSON.parse(JSON.stringify(lastAnalysisResult));
  liveImages=lastAnalysisImages.slice();
  render();toast('Previous analysis restored');
}
function logLiveResult(){
  if(!liveResult)return;
  if(!confirm('Log this sofa to Scout? This clears the current result.'))return;
  // Save a copy so user can recall it
  lastAnalysisResult=JSON.parse(JSON.stringify(liveResult));
  lastAnalysisImages=liveImages.slice();
  var v=liveResult;
  var s={
    name:v.name||'Analysed sofa',
    price:document.getElementById('live-price')?document.getElementById('live-price').value:'',
    condition:v.condition||'Good',
    brand:v.brand||'',area:'',market:'Facebook',url:'',
    desc:(v.pros?('Pros: '+(Array.isArray(v.pros)?v.pros.join('; '):v.pros)+'. '):'')+(v.cons?('Cons: '+(Array.isArray(v.cons)?v.cons.join('; '):v.cons)):'' ),
    photos:String(liveImages.length||4)
  };
  var sc=scoreListing(s);
  s.score=sc.score;s.reasons=sc.reasons;s.id=uid();s.added=Date.now();
  s.resale=(v.resale_low&&v.resale_high)?('£'+v.resale_low+'-'+v.resale_high):'';
  s.estProfit=(v.est_profit!=null)?v.est_profit:'';
  scouted.unshift(s);saveScout();
  liveResult=null;liveImages=[];
  render();toast('Logged to Scout — scored '+sc.score+'/100');
}

    +(liveImages.length?'<button class="btn btn-sm" onclick="clearLiveImages()">Clear all</button>':'')
  +(lastAnalysisResult&&!liveResult?'<button class="btn btn-sm" onclick="recallAnalysis()" style="margin-left:4px">&#8635; Recall last analysis</button>':'')+'</div>';

  if(liveBusy){
    html+='<div style="text-align:center;padding:20px;color:var(--muted);font-style:italic">Reading '+liveImages.length+' image'+(liveImages.length!==1?'s':'')+', checking resale value…</div>';
  }

  if(liveResult){
    var v=liveResult;
    if(v._parseError){
      html+='<div class="card" style="border-left:4px solid var(--red);margin-top:14px"><div class="card-title" style="color:var(--red)">Could not parse AI response</div><div class="card-desc">Claude replied but the format was unexpected. Read the raw output below and enter numbers manually into Scout.</div><details><summary style="cursor:pointer;font-size:13px;color:var(--muted-2);font-weight:600">Show raw response</summary><div style="font-size:12px;color:var(--ink-3);background:var(--bg);padding:10px;border-radius:8px;white-space:pre-wrap;max-height:200px;overflow-y:auto">'+v.raw+'</div></details><div style="margin-top:12px"><button class="btn btn-sm" onclick="liveResult=null;render()">Clear</button></div></div>';

function exportCSV(){
  var rows=[['Sofa','Type','Brand','Status','Seller','Area','Buy','Delivery','Fees','Listed','Sold','Deposit','Profit','Margin %','Hours','Profit/hr','Days to sell','Date added','Date sold']];
  deals.forEach(function(d){
    var p=profit(d);var mp=marginPct(d);var pph=profitPerHour(d);var dts=daysToSell(d);
    rows.push([
      (d.name||'').replace(/,/g,';'),d.type||'',d.brand||'',d.status||'',(d.seller||'').replace(/,/g,';'),(d.area||'').replace(/,/g,';'),
      d.buy||'',d.del||'',d.fees||'',d.listed||'',d.sell||'',d.deposit||'',
      p!==null?p.toFixed(2):'',mp!==null?mp.toFixed(1):'',d.hrs||'',pph!==null?pph.toFixed(2):'',dts!==null?dts:'',
      new Date(d.ts).toLocaleDateString('en-GB'),d.soldTime?new Date(d.soldTime).toLocaleDateString('en-GB'):''
    ]);
  });
  var csv=rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob=new Blob([csv],{type:'text/csv'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='sitbackandco-export-'+todayStr().replace(/\//g,'-')+'.csv';a.click();
  URL.revokeObjectURL(url);
  toast('CSV downloaded');
}
